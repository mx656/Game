<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Dash 2 - Always Fair</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid #222;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border-radius: 4px;
            cursor: pointer;
        }
        .info {
            position: absolute;
            bottom: 15px;
            color: #555;
            font-size: 12px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="320" aria-label="Neon Dash canvas"></canvas>
    <div class="info">TAP / SPACE TO JUMP | DOUBLE TAP FOR EXTRA JUMP</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            const W = canvas.width;
            const H = canvas.height;
            const GROUND_Y = H - 40;

            const PLAYER_WIDTH = 22;
            const PLAYER_HEIGHT = 22;
            const PLAYER_X = 70;

            const STATE = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };
            let gameState = STATE.START;
            let score = 0;
            let highScore = 0;
            let speed = 5;
            const MAX_SPEED = 13;
            const SPEED_INCREASE_PER_SCORE = 0.01;

            // Player with double jump
            let player = {
                x: PLAYER_X,
                y: GROUND_Y - PLAYER_HEIGHT,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                vy: 0,
                grounded: true,
                doubleJumpAvailable: true
            };

            const GRAVITY = 0.55;
            const JUMP_VELOCITY = -9.2;       // higher than before
            const DOUBLE_JUMP_VELOCITY = -6.5;

            // Obstacles – now capped based on current speed
            let obstacles = [];
            const OBSTACLE_WIDTH = 20;
            const BASE_MIN_HEIGHT = 24;
            const BASE_MAX_HEIGHT = 44;       // reduced from 50

            let spawnTimer = 0;
            const BASE_SPAWN_DELAY = 70;

            let particles = [];
            let flashAlpha = 0;
            let stars = [];
            const STAR_COUNT = 60;

            try {
                const saved = localStorage.getItem('neonDash2HighScore');
                if (saved) highScore = parseInt(saved, 10) || 0;
            } catch (e) {}

            function deltaFactor(dt) {
                return dt / (1 / 60);
            }

            // Calculate the maximum obstacle height that is always jumpable
            // at the current speed. Uses the player's jump physics to leave a safety margin.
            function getMaxClearableHeight(currentSpeed) {
                // Jump peak height (from ground) = v0^2 / (2*g)
                const peak = (JUMP_VELOCITY * JUMP_VELOCITY) / (2 * GRAVITY);
                // The time in frames the obstacle overlaps the player:
                const totalWidth = PLAYER_WIDTH + OBSTACLE_WIDTH;
                const overlapFrames = totalWidth / currentSpeed;
                // The height the player can reach in half the overlap time (to be safe)
                // We'll just use a generous fraction of the peak height and subtract some.
                // More speed → less time to rise → effectively lower safe height.
                const safetyFactor = Math.max(0.55, 1.0 - currentSpeed * 0.03);
                return Math.floor(peak * safetyFactor - 4);
            }

            function resetGame() {
                player.y = GROUND_Y - PLAYER_HEIGHT;
                player.vy = 0;
                player.grounded = true;
                player.doubleJumpAvailable = true;
                obstacles = [];
                particles = [];
                flashAlpha = 0;
                score = 0;
                speed = 5;
                spawnTimer = 0;
                gameState = STATE.PLAYING;
            }

            function spawnObstacle() {
                const maxClearable = getMaxClearableHeight(speed);
                // Use a dynamic max that never exceeds the clearable height, with a floor.
                const maxH = Math.max(BASE_MIN_HEIGHT, Math.min(BASE_MAX_HEIGHT, maxClearable));
                const minH = Math.min(BASE_MIN_HEIGHT, maxH - 8);
                const height = minH + Math.random() * (maxH - minH);
                obstacles.push({
                    x: W,
                    y: GROUND_Y - height,
                    width: OBSTACLE_WIDTH,
                    height: height,
                    counted: false
                });
            }

            function createDeathParticles() {
                const count = 14;
                const cx = player.x + player.width / 2;
                const cy = player.y + player.height / 2;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    particles.push({
                        x: cx,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1.5,
                        life: 1.0,
                        decay: 0.02 + Math.random() * 0.03,
                        size: 3 + Math.random() * 5,
                        color: Math.random() < 0.5 ? '#0ff' : '#f0f'
                    });
                }
                flashAlpha = 0.5;
            }

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * (GROUND_Y - 10),
                        speed: 0.5 + Math.random() * 2.5,
                        radius: 0.5 + Math.random() * 1.8
                    });
                }
            }
            initStars();

            function update(dtSec) {
                const factor = deltaFactor(dtSec);
                const cappedFactor = Math.min(factor, 3.0);

                // Update background stars
                for (let s of stars) {
                    s.x -= s.speed * cappedFactor * 0.4;
                    if (s.x < -5) {
                        s.x = W + 5;
                        s.y = Math.random() * (GROUND_Y - 10);
                    }
                }

                if (gameState !== STATE.PLAYING) {
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx * cappedFactor;
                        p.y += p.vy * cappedFactor;
                        p.life -= p.decay * cappedFactor;
                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    flashAlpha = Math.max(0, flashAlpha - 0.03 * cappedFactor);
                    return;
                }

                // Player physics
                player.vy += GRAVITY * cappedFactor;
                player.y += player.vy * cappedFactor;

                // Ground check
                if (player.y + player.height >= GROUND_Y) {
                    player.y = GROUND_Y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleJumpAvailable = true;
                } else {
                    player.grounded = false;
                }

                // Spawn obstacles
                const currentSpawnDelay = Math.max(28, BASE_SPAWN_DELAY - speed * 3.2);
                spawnTimer += cappedFactor;
                if (spawnTimer >= currentSpawnDelay) {
                    spawnTimer = 0;
                    spawnObstacle();
                }

                // Move obstacles & collision
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.x -= speed * cappedFactor;

                    if (!obs.counted && obs.x + obs.width < player.x) {
                        obs.counted = true;
                        score++;
                        speed = Math.min(MAX_SPEED, 5 + score * SPEED_INCREASE_PER_SCORE);
                    }

                    if (obs.x + obs.width < -10) {
                        obstacles.splice(i, 1);
                        continue;
                    }

                    // Collision
                    if (
                        player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height &&
                        player.y + player.height > obs.y
                    ) {
                        gameState = STATE.GAMEOVER;
                        createDeathParticles();
                        if (score > highScore) {
                            highScore = score;
                            try {
                                localStorage.setItem('neonDash2HighScore', highScore);
                            } catch (e) {}
                        }
                        break;
                    }
                }

                // Particles & flash
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * cappedFactor;
                    p.y += p.vy * cappedFactor;
                    p.life -= p.decay * cappedFactor;
                    if (p.life <= 0) particles.splice(i, 1);
                }
                flashAlpha = Math.max(0, flashAlpha - 0.04 * cappedFactor);
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#0a0a14');
                bgGrad.addColorStop(0.7, '#111122');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Stars
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#ffffff';
                for (let s of stars) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Ground
                ctx.beginPath();
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 10;
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(W, GROUND_Y);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Obstacles
                for (let obs of obstacles) {
                    ctx.fillStyle = '#ff00ff';
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 14;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }

                // Player
                ctx.fillStyle = '#00ffff';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 18;
                ctx.fillRect(player.x, player.y, player.width, player.height);

                // Double jump indicator – tiny cyan dot above player when available
                if (!player.grounded && player.doubleJumpAvailable) {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowColor = '#ffffff';
                    ctx.shadowBlur = 8;
                    ctx.beginPath();
                    ctx.arc(player.x + player.width/2, player.y - 8, 3, 0, Math.PI*2);
                    ctx.fill();
                }

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Particles
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Flash
                if (flashAlpha > 0.01) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                // UI
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';

                if (gameState === STATE.START) {
                    ctx.fillText('NEON DASH 2', W / 2, H / 2 - 35);
                    ctx.font = '13px "Courier New", monospace';
                    ctx.fillText('TAP OR SPACE TO JUMP', W / 2, H / 2 + 5);
                    ctx.fillText('DOUBLE TAP FOR EXTRA JUMP', W / 2, H / 2 + 25);
                } else if (gameState === STATE.PLAYING) {
                    ctx.fillText(score, W / 2, 50);
                } else if (gameState === STATE.GAMEOVER) {
                    ctx.fillText('GAME OVER', W / 2, H / 2 - 35);
                    ctx.font = '16px "Courier New", monospace';
                    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 5);
                    ctx.fillText(`BEST: ${highScore}`, W / 2, H / 2 + 30);
                    ctx.font = '12px "Courier New", monospace';
                    ctx.fillText('TAP TO RESTART', W / 2, H / 2 + 55);
                }
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.textAlign = 'left';
            }

            function gameLoop(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                let dtSec = (timestamp - lastTimestamp) / 1000;
                if (dtSec <= 0) dtSec = 0.016;
                lastTimestamp = timestamp;

                update(dtSec);
                draw();
                requestAnimationFrame(gameLoop);
            }
            let lastTimestamp = 0;

            function handleJump() {
                if (gameState === STATE.START) {
                    resetGame();
                } else if (gameState === STATE.PLAYING) {
                    if (player.grounded) {
                        player.vy = JUMP_VELOCITY;
                        player.grounded = false;
                        player.doubleJumpAvailable = true;   // reset for new jump sequence
                    } else if (player.doubleJumpAvailable) {
                        // Double jump!
                        player.vy = DOUBLE_JUMP_VELOCITY;
                        player.doubleJumpAvailable = false;
                        // small burst of particles
                        for (let i=0; i<6; i++) {
                            particles.push({
                                x: player.x + player.width/2,
                                y: player.y + player.height,
                                vx: (Math.random() - 0.5) * 3,
                                vy: -2 - Math.random() * 3,
                                life: 0.7,
                                decay: 0.05,
                                size: 2 + Math.random()*3,
                                color: '#ffffff'
                            });
                        }
                    }
                } else if (gameState === STATE.GAMEOVER) {
                    resetGame();
                }
            }

            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' || e.key === ' ') {
                    e.preventDefault();
                    handleJump();
                }
            });

            canvas.addEventListener('mousedown', function(e) {
                e.preventDefault();
                handleJump();
            });

            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handleJump();
            }, { passive: false });

            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
