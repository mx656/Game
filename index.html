                ctx.restore();
                jumpBtn.style.display = ((gameState === STATE.PLAYING || gameState === STATE.HARD || gameState === STATE
                    .INSANE) && !paused) || gameState === STATE.BOSS || gameState === STATE.BOSS2 ? 'flex' : 'none';
                abilityBtn.style.display = ((gameState === STATE.PLAYING || gameState === STATE.HARD || gameState === STATE
                    .INSANE) && !paused) || gameState === STATE.BOSS || gameState === STATE.BOSS2 ? 'flex' : 'none';
                slideBtn.style.display = ((gameState === STATE.PLAYING || gameState === STATE.HARD || gameState === STATE
                    .INSANE) && !paused) ? 'flex' : 'none';
                shareBtn.style.display = gameState === STATE.GAMEOVER ? 'block' : 'none';
                muteBtn.textContent = muted ? '🔇' : '🔊';
            }

            // ==================== INPUT ====================
            function getCanvasCoords(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * W / r
                        .width, y: (e.clientY - r.top) * H / r.height }; }

            function performJump() {
                if ((gameState !== STATE.PLAYING && gameState !== STATE.HARD && gameState !== STATE.INSANE && gameState !==
                        STATE.BOSS && gameState !== STATE.BOSS2) || paused) return;
                totalJumps++;
                if (player.grounded) { player.vy = JUMP_VEL * gravityDir;
                    player.grounded = false;
                    player.doubleJumpAvailable = true;
                    sfxJump(); } else if (player.doubleJumpAvailable) { if (gameState === STATE.INSANE) { setGravityDir(
                            gravityDir * -1);
                        player.vy = DOUBLE_JUMP_VEL * gravityDir; } else player.vy = DOUBLE_JUMP_VEL * gravityDir;
                    player.doubleJumpAvailable = false;
                    sfxJump(); } else if (extraJumpsActive) { if (gameState === STATE.INSANE) { setGravityDir(gravityDir *
                            -1);
                        player.vy = DOUBLE_JUMP_VEL * gravityDir; } else player.vy = DOUBLE_JUMP_VEL * gravityDir;
                    sfxJump(); }
            }

            function performSlide() { if (!player.grounded || isSliding) return;
                isSliding = true;
                slideTimer = SLIDE_DURATION;
                player.height = SLIDE_HEIGHT;
                sfxSlide(); }

            canvas.addEventListener('mousedown', e => {
                const c = getCanvasCoords(e);
                handleCanvasClick(c.x, c.y);
            });

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                const t = e.touches[0];
                const c = getCanvasCoords(t);
                touchStartX = c.x;
                touchStartY = c.y;
                touchMoved = false;
                touchDragging = false;
            }, { passive: false });

            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (!isScrollableScreen) return;
                const t = e.touches[0];
                const c = getCanvasCoords(t);
                const dy = touchStartY - c.y;
                if (Math.abs(dy) > SCROLL_THRESHOLD || touchDragging) {
                    touchDragging = true;
                    touchMoved = true;
                    targetScrollY += dy * 0.8;
                    targetScrollY = Math.max(0, Math.min(maxScrollY, targetScrollY));
                    scrollY = targetScrollY;
                    touchStartY = c.y;
                    touchStartX = c.x;
                    updateScrollIndicators();
                }
            }, { passive: false });

            canvas.addEventListener('touchend', e => {
                e.preventDefault();
                if (!touchMoved && !touchDragging) {
                    handleCanvasClick(touchStartX, touchStartY);
                }
                touchDragging = false;
                touchMoved = false;
                targetScrollY = scrollY;
            }, { passive: false });

            canvas.addEventListener('wheel', e => {
                if (!isScrollableScreen) return;
                e.preventDefault();
                targetScrollY += e.deltaY * 0.6;
                targetScrollY = Math.max(0, Math.min(maxScrollY, targetScrollY));
                updateScrollIndicators();
            }, { passive: false });

            jumpBtn.addEventListener('mousedown', e => { e.stopPropagation();
                performJump(); });
            jumpBtn.addEventListener('touchstart', e => { e.stopPropagation();
                performJump(); });
            abilityBtn.addEventListener('mousedown', e => { e.stopPropagation();
                activateEquippedAbility(); });
            abilityBtn.addEventListener('touchstart', e => { e.stopPropagation();
                activateEquippedAbility(); });
            slideBtn.addEventListener('mousedown', e => { e.stopPropagation();
                performSlide(); });
            slideBtn.addEventListener('touchstart', e => { e.stopPropagation();
                performSlide(); });
            muteBtn.addEventListener('click', () => { muted = !muted;
                saveData(); if (muted) stopMusic(); else if (gameState === STATE.PLAYING || gameState === STATE.HARD ||
                    gameState === STATE.INSANE || gameState === STATE.BOSS || gameState === STATE.BOSS2) startMusic(); });
            shareBtn.addEventListener('click', () => { if (gameState === STATE.GAMEOVER && score > 0) { const url = new URL(
                        window.location.href);
                    url.searchParams.set('score', score);
                    const str = url.toString(); if (navigator.share) navigator.share({ title: 'Neon Gauntlet Score',
                        text: `I scored ${score}!`, url: str }); else { navigator.clipboard.writeText(str).then(() =>
                        alert('Score link copied!')); } } });

            document.addEventListener('keydown', e => {
                if (e.code === 'Space' || e.key === ' ') { e.preventDefault(); if (gameState === STATE.GAMEOVER) {
                        gameState = STATE.MENU;
                        stopMusic();
                        clearScrollableScreen(); } else performJump(); }
                if (e.code === 'KeyE' && !paused) { e.preventDefault();
                    activateEquippedAbility(); }
                if ((e.code === 'KeyP' || e.code === 'Escape') && (gameState === STATE.PLAYING || gameState === STATE.HARD ||
                        gameState === STATE.INSANE)) { e.preventDefault();
                    paused = !paused; if (paused) stopMusic();
                    else startMusic(); }
                if (e.code === 'KeyS' || e.key === 's') { e.preventDefault();
                    performSlide(); }
            });

            function activateEquippedAbility() { if (equippedAbilities.length === 0) return; for (let key of equippedAbilities)
                    if (!abilityCooldowns[key] || abilityCooldowns[key] <= 0) { activateAbility(key); return; } }
            window.leaderboardTab = 'local';

            function handleCanvasClick(mx, my) {
                const isPlay = gameState === STATE.PLAYING || gameState === STATE.HARD || gameState === STATE.INSANE;
                if (isPlay && !paused && mx >= W - 45 && mx <= W - 10 && my >= 10 && my <= 45) { paused = true;
                    stopMusic(); return; }
                if (isPlay && paused) { if (mx >= W / 2 - 60 && mx <= W / 2 + 60 && my >= H / 2 && my <= H / 2 + 45) { paused =
                            false;
                        startMusic(); return; }
                    paused = false;
                    startMusic(); return; }
                if (gameState === STATE.GAMEOVER) { gameState = STATE.MENU;
                    stopMusic();
                    clearScrollableScreen(); return; }
                if (gameState === STATE.SETTINGS && window._resetConfirm) {
                    if (mx >= W / 2 - 100 && mx <= W / 2 - 10 && my >= H / 2 + 20 && my <= H / 2 + 52) {
                        resetAll();
                        loadData();
                        window._resetConfirm = false;
                        gameState = STATE.MENU;
                        clearScrollableScreen();
                        showMessage('All data reset!', 2);
                        return;
                    }
                    if (mx >= W / 2 + 10 && mx <= W / 2 + 100 && my >= H / 2 + 20 && my <= H / 2 + 52) {
                        window._resetConfirm = false;
                        return;
                    }
                    window._resetConfirm = false;
                    return;
                }
                const btns = getCurrentButtons();
                for (let b of btns)
                    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { handleButton(b.id); return; }
                if (isPlay || gameState === STATE.BOSS || gameState === STATE.BOSS2) performJump();
            }

            function getCurrentButtons() {
                if (gameState === STATE.MENU) {
                    const btns = [
                        { id: 'normal', x: W / 2 - 70, y: 110 - scrollY, w: 140, h: 30 },
                        { id: 'hard', x: W / 2 - 70, y: 145 - scrollY, w: 140, h: 30 },
                        { id: 'insane', x: W / 2 - 70, y: 180 - scrollY, w: 140, h: 30 },
                        { id: 'shop', x: W / 2 - 70, y: 215 - scrollY, w: 140, h: 30 },
                        { id: 'leaderboard', x: W / 2 - 70, y: 250 - scrollY, w: 140, h: 30 },
                        { id: 'boss', x: W / 2 - 70, y: 285 - scrollY, w: 140, h: 30 },
                    ];
                    if (bossDefeated) btns.push({ id: 'boss2', x: W / 2 - 70, y: 315 - scrollY, w: 140, h: 25 });
                    btns.push({ id: 'settings', x: W - 50, y: 8, w: 42, h: 22 });
                    return btns;
                }
                if (gameState === STATE.SHOP) {
                    const btns = [];
                    // FIX: fixed back button (outside scroll)
                    btns.push({ id: 'back', x: W - 55, y: 5, w: 45, h: 22 });
                    let y = 80;
                    for (let key in ABILITY_DEFS) {
                        const lvl = getAbilityLevel(key),
                            owned = lvl > 0,
                            equipped = equippedAbilities.includes(key);
                        const canUpgrade = owned && lvl + 1 <= ABILITY_DEFS[key].maxLevel;
                        if (!owned) btns.push({ id: 'buy_' + key, x: W / 2 - 40, y: y + 14 - scrollY, w: 80, h: 20 });
                        else if (canUpgrade) btns.push({ id: 'upgrade_' + key, x: W / 2 - 40, y: y + 14 - scrollY, w: 80,
                            h: 20 });
                        if (owned && !equipped && equippedAbilities.length < abilitySlots) btns.push({ id: 'equip_' + key,
                            x: W / 2 + 40, y: y + 14 - scrollY, w: 80, h: 20 });
                        else if (equipped) btns.push({ id: 'unequip_' + key, x: W / 2 + 40, y: y + 14 - scrollY, w: 80,
                        h: 20 });
                        y += 40;
                    }
                    if (abilitySlots < 3) btns.push({ id: 'buy_slot', x: W / 2 - 40, y: y + 16 - scrollY, w: 80, h: 22 });
                    return btns;
                }
                if (gameState === STATE.LEADERBOARD) return [{ id: 'tab_local', x: W / 2 - 100, y: 50, w: 100, h: 25 },
                    { id: 'tab_global', x: W / 2, y: 50, w: 100, h: 25 }, { id: 'back', x: 20, y: H - 45, w: 80, h: 30 }
                ];
                if (gameState === STATE.SETTINGS) {
                    const btns = [
                        { id: 'prev_char', x: W / 2 - 100, y: 72, w: 60, h: 28 },
                        { id: 'next_char', x: W / 2 + 40, y: 72, w: 60, h: 28 },
                        { id: 'toggle_mute', x: W / 2 - 60, y: 115, w: 120, h: 30 },
                        { id: 'reset_data', x: W / 2 - 60, y: 190, w: 120, h: 32 },
                        { id: 'back', x: W / 2 - 40, y: 240, w: 80, h: 32 },
                    ];
                    if (window._resetConfirm) {
                        btns.push({ id: 'confirm_reset', x: W / 2 - 100, y: H / 2 + 20, w: 90, h: 32 });
                        btns.push({ id: 'cancel_reset', x: W / 2 + 10, y: H / 2 + 20, w: 90, h: 32 });
                    }
                    return btns;
                }
                return [];
            }

            function handleButton(id) {
                if (id === 'normal') startRun('normal');
                else if (id === 'hard') startRun('hard');
                else if (id === 'insane') startRun('insane');
                else if (id === 'shop') { gameState = STATE.SHOP;
                    stopMusic(); } else if (id === 'leaderboard') { gameState = STATE.LEADERBOARD;
                    stopMusic();
                    clearScrollableScreen(); } else if (id === 'boss' && !bossDefeated) startBoss(false);
                else if (id === 'boss2' && bossDefeated && !boss2Defeated) startBoss2();
                else if (id === 'settings') { gameState = STATE.SETTINGS;
                    stopMusic();
                    clearScrollableScreen();
                    window._resetConfirm = false; } else if (id === 'back') { gameState = STATE.MENU;
                    saveData();
                    clearScrollableScreen(); } else if (id === 'tab_local') { window.leaderboardTab = 'local';
                    gameState = STATE.LEADERBOARD; } else if (id === 'tab_global') { window.leaderboardTab = 'global';
                    gameState = STATE.LEADERBOARD; } else if (id === 'buy_slot' && abilitySlots < 3) { const cost = 50 +
                        abilitySlots * 30; if (playerCoins >= cost) { playerCoins -= cost;
                        abilitySlots++;
                        saveData(); } } else if (id.startsWith('buy_')) { const k = id.substring(4); if (!abilitiesData[k]
                        ?.level && playerCoins >= ABILITY_DEFS[k].baseCost) { playerCoins -= ABILITY_DEFS[k].baseCost;
                        abilitiesData[k] = { level: 1 };
                        saveData(); } } else if (id.startsWith('upgrade_')) { const k = id.substring(8); if (getAbilityLevel(
                            k) < ABILITY_DEFS[k].maxLevel && playerCoins >= getAbilityUpgradeCost(k)) { playerCoins -=
                            getAbilityUpgradeCost(k);
                        abilitiesData[k].level++;
                        saveData(); } } else if (id.startsWith('equip_')) { const k = id.substring(6); if (!equippedAbilities
                        .includes(k) && equippedAbilities.length < abilitySlots) { equippedAbilities.push(k);
                        saveData(); } } else if (id.startsWith('unequip_')) { const k = id.substring(8);
                    equippedAbilities = equippedAbilities.filter(a => a !== k);
                    saveData(); } else if (id === 'prev_char') { const unlocked = unlockedCharacters.filter(id => AVATARS.find(
                        a => a.id === id));
                    const idx = unlocked.indexOf(activeCharacter); if (idx > 0) { activeCharacter = unlocked[idx - 1];
                        saveData(); } } else if (id === 'next_char') { const unlocked = unlockedCharacters.filter(id => AVATARS
                        .find(a => a.id === id));
                    const idx = unlocked.indexOf(activeCharacter); if (idx < unlocked.length - 1) { activeCharacter =
                            unlocked[idx + 1];
                        saveData(); } } else if (id === 'toggle_mute') { muted = !muted;
                    saveData(); if (muted) stopMusic(); } else if (id === 'reset_data') { window._resetConfirm = true; } else if (
                    id === 'confirm_reset') { resetAll();
                    loadData();
                    window._resetConfirm = false;
                    gameState = STATE.MENU;
                    clearScrollableScreen();
                    showMessage('All data reset!', 2); } else if (id === 'cancel_reset') { window._resetConfirm = false; }
            }

            // ==================== INIT ====================
            loadData();
            // FIX: clear boss retry on reload to prevent broken state
            if (bossAttemptRemaining) { bossAttemptRemaining = false;
                saveData(); }
            loadLeaderboard();
            loadSharedScores();
            checkURLForScore();
            stars = Array.from({ length: STAR_COUNT }, () => ({ x: Math.random() * W, y: Math.random() * H, speed: 0.5 + Math
                    .random() * 2, radius: 0.5 + Math.random() * 1.8 }));
            document.addEventListener('touchstart', resumeAudio, { once: true });
            document.addEventListener('mousedown', resumeAudio, { once: true });
            clearScrollableScreen();
            window._resetConfirm = false;

            let accumulator = 0,
                lastTime = 0;

            function loop(time) {
                if (!lastTime) lastTime = time;
                let dt = (time - lastTime) / 1000;
                if (dt > 0.1) dt = 0.1;
                accumulator += dt;
                while (accumulator >= FIXED_DT) { update();
                    accumulator -= FIXED_DT; }
                draw();
                lastTime = time;
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
