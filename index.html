<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Gauntlet – 8‑Point Star Avatar</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            width: 100%;
            max-width: 900px;
            height: auto;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            image-rendering: crisp-edges;
        }
        .info {
            position: absolute; bottom: 10px; color: #555; font-size:12px; text-align:center; width:100%; pointer-events:none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <div class="info">TAP / SPACE = JUMP (DOUBLE TAP FOR AIR JUMP)</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = 480, H = 320;
            const GROUND_Y = H - 40;
            const PLAYER_W = 22, PLAYER_H = 22;
            const PLAYER_X = 70;

            const STATE = { MENU:'menu', PLAYING:'playing', SHOP:'shop', BOSS:'boss', GAMEOVER:'gameover', LEADERBOARD:'leaderboard' };
            let gameState = STATE.MENU;

            let playerCoins = 0;
            let unlockedAbilities = [];
            let equippedAbilities = [];
            let abilitySlots = 1;
            let bossDefeated = false;
            let highScore = 0;
            let leaderboard = [];

            const SAVE_KEY = 'neonGauntletV8';
            const LEADERBOARD_KEY = 'neonGauntletLeaderboard';

            const ABILITIES = {
                shield:    { name:'Shield',       desc:'Start with 1 hit shield',   cost:30, color:'#00ccff' },
                slowTime:  { name:'Slow Time',    desc:'Speed reduced by 25%',       cost:50, color:'#ffaa00' },
                coinMagnet:{ name:'Coin Magnet',  desc:'Attract coins from afar',    cost:20, color:'#ffdd44' },
                doubleScore:{ name:'Double Score',desc:'Earn 2x points',             cost:40, color:'#ff44ff' },
                tripleJump:{ name:'Triple Jump',  desc:'One extra mid‑air jump',     cost:60, color:'#ff2222' }
            };

            const AVATARS = [
                { min:0,   shape:'square',    color:'#00ffff', glow:'#00ffff', name:'Rookie' },
                { min:10,  shape:'diamond',   color:'#ff44ff', glow:'#ff44ff', name:'Dasher' },
                { min:25,  shape:'circle',    color:'#ffaa00', glow:'#ffaa00', name:'Runner' },
                { min:50,  shape:'star5',     color:'#00ff44', glow:'#00ff44', name:'Elite' },
                { min:100, shape:'hexagon',   color:'#ffd700', glow:'#ffd700', name:'Legend' },
                { min:200, shape:'star8',     color:'#ff8800', glow:'#ff8800', name:'Master' }
            ];

            let score = 0, runCoins = 0;
            let speed = 5, baseSpeed = 5;
            let level = 1;
            const SCORE_PER_LEVEL = 15;
            let scoreThisLevel = 0;
            const SPEED_INC_PER_SCORE = 0.01;
            const LEVEL_SPEED_BOOST = 1.1;

            let player = {
                x: PLAYER_X, y: GROUND_Y - PLAYER_H,
                width: PLAYER_W, height: PLAYER_H,
                vy:0, grounded:true, doubleJumpAvailable:true,
                extraJumps:0, shield:0
            };
            const GRAVITY = 0.55, JUMP_VEL = -9.2, DOUBLE_JUMP_VEL = -6.5;

            let obstacles = [], coins = [];
            const OBS_W = 20, OBS_MIN_H = 24, OBS_MAX_H = 44;
            const COIN_SIZE = 12;
            let spawnTimer=0, coinSpawnTimer=0;
            const BASE_SPAWN_DELAY = 70, COIN_SPAWN_DELAY = 90;

            // Boss fight
            let bossLives = 0;
            let bossDodged = 0;
            const BOSS_REQUIRED_DODGES = 40;
            const BOSS_ENTRY_FEE = 30;
            const MAX_BOSS_LIVES = 10;
            let bossEntity = { x: W-80, y: 60, width:60, height:100, vibrate:0 };
            let bossObstacles = [];
            let bossSpawnTimer = 0;
            let bossSpawnCooldown = 35;
            let bossActiveObstaclesSpawned = 0;

            let particles=[], flashAlpha=0, shakeAmount=0;
            let speedLines=[], stars=[];
            const STAR_COUNT = 50;

            const themes = [
                { bg:['#0a0a14','#111122'], ground:'#00ffff', obs:'#ff00ff', stars:'#ffffff' },
                { bg:['#140a0a','#221111'], ground:'#ffaa00', obs:'#ff4400', stars:'#ff8844' },
                { bg:['#0a141a','#0a1f2b'], ground:'#00ccff', obs:'#0088ff', stars:'#88ddff' },
                { bg:['#0a140a','#112211'], ground:'#00ff44', obs:'#44ff00', stars:'#88ff44' },
                { bg:['#140a14','#221122'], ground:'#ff44ff', obs:'#ff00aa', stars:'#ffaaff' },
                { bg:['#0a0a14','#1a1a2e'], ground:'#ffd700', obs:'#ffaa00', stars:'#ffe066' },
                { bg:['#140a0a','#0a1414'], ground:'#ff3333', obs:'#33ccff', stars:'#ff9966' },
                { bg:['#1a0a1a','#2a0a2a'], ground:'#ffcc00', obs:'#ff0066', stars:'#ff6699' }
            ];
            let currentTheme = themes[0];
            let buttons = [];

            // Music
            let audioCtx = null;
            let musicInterval = null;
            let musicActive = false;

            function initAudio() {
                if (audioCtx) return;
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { console.warn('Web Audio not supported'); }
            }
            function playTone(freq, duration, type='square', volume=0.08) {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + duration);
            }
            function startMusic() {
                if (musicActive) return; initAudio();
                if (!audioCtx || audioCtx.state === 'suspended') audioCtx?.resume();
                musicActive = true; scheduleNextBeat();
            }
            function stopMusic() { musicActive = false; if (musicInterval) { clearTimeout(musicInterval); musicInterval = null; } }
            function scheduleNextBeat() {
                if (!musicActive || !audioCtx) return;
                let bpm = 120;
                if (gameState === STATE.PLAYING) bpm = 120 + speed * 8;
                else if (gameState === STATE.BOSS) bpm = 140 + bossDodged * 2;
                const interval = 60000 / bpm;
                playTone(60, 0.1, 'sine', 0.15);
                if (Math.random() < 0.5) playTone(800, 0.05, 'square', 0.03);
                const noteBase = [262, 294, 330, 349, 392, 440, 494, 523];
                const noteIndex = (level - 1) % noteBase.length;
                playTone(noteBase[noteIndex], 0.12, 'triangle', 0.06);
                musicInterval = setTimeout(scheduleNextBeat, interval);
            }

            // Data
            function loadData() {
                try {
                    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
                    if (d) {
                        playerCoins = d.coins || 0; unlockedAbilities = d.unlocked || [];
                        equippedAbilities = d.equipped || []; abilitySlots = d.slots || 1;
                        bossDefeated = d.boss || false; highScore = d.highScore || 0;
                    }
                } catch(e) { resetAll(); }
                if (abilitySlots < 1) abilitySlots = 1;
                if (equippedAbilities.length > abilitySlots) equippedAbilities = equippedAbilities.slice(0, abilitySlots);
            }
            function saveData() {
                try {
                    localStorage.setItem(SAVE_KEY, JSON.stringify({
                        coins:playerCoins, unlocked:unlockedAbilities,
                        equipped:equippedAbilities, slots:abilitySlots,
                        boss:bossDefeated, highScore:highScore
                    }));
                } catch(e) {}
            }
            function resetAll() { playerCoins=0; unlockedAbilities=[]; equippedAbilities=[]; abilitySlots=1; bossDefeated=false; highScore=0; saveData(); }

            function loadLeaderboard() {
                try { const d = JSON.parse(localStorage.getItem(LEADERBOARD_KEY)); if (d) leaderboard = d; } catch(e) { leaderboard = []; }
            }
            function saveLeaderboard(sc) {
                leaderboard.push(sc); leaderboard.sort((a,b)=>b-a);
                if (leaderboard.length > 10) leaderboard.pop();
                localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard));
                highScore = Math.max(...leaderboard);
            }

            function getAvatar() {
                for (let i = AVATARS.length-1; i >= 0; i--) if (highScore >= AVATARS[i].min) return AVATARS[i];
                return AVATARS[0];
            }

            // Run helpers
            function resetRun() {
                player.y = GROUND_Y - PLAYER_H; player.vy = 0; player.grounded = true;
                player.doubleJumpAvailable = true; player.extraJumps = 0; player.shield = 0;
                obstacles = []; coins = []; particles = []; speedLines = [];
                flashAlpha = 0; shakeAmount = 0; spawnTimer = 0; coinSpawnTimer = 0;
                score = 0; runCoins = 0; scoreThisLevel = 0; level = 1;
                baseSpeed = 5; speed = 5; currentTheme = themes[0];
                for (let ab of equippedAbilities) {
                    if (ab === 'shield') player.shield += 1;
                    if (ab === 'tripleJump') player.extraJumps += 1;
                }
                if (equippedAbilities.includes('slowTime')) speed *= 0.75;
            }

            function getMaxClearableHeight(spd) {
                const peak = (JUMP_VEL * JUMP_VEL) / (2 * GRAVITY);
                return Math.floor(peak * Math.max(0.4, 1.0 - spd * 0.035) - 4);
            }

            function spawnObstacle() {
                const maxH = getMaxClearableHeight(speed);
                const h = 24 + Math.random() * (maxH - 24);
                obstacles.push({ x:W, y:GROUND_Y-h, width:OBS_W, height:h, counted:false });
            }
            function spawnCoin() {
                coins.push({ x:W, y:GROUND_Y-50-Math.random()*30, width:COIN_SIZE, height:COIN_SIZE, collected:false });
            }

            function advanceLevel() {
                level++; baseSpeed = Math.min(level*1.2+3.8, 25);
                speed = baseSpeed;
                if (equippedAbilities.includes('slowTime')) speed *= 0.75;
                scoreThisLevel = 0;
                currentTheme = themes[(level-1)%themes.length];
                shakeAmount = 6;
                for (let i=0; i<15; i++) {
                    particles.push({
                        x:W/2+(Math.random()-0.5)*100, y:H/2-30,
                        vx:(Math.random()-0.5)*5, vy:-Math.random()*4,
                        life:1, decay:0.03, size:4+Math.random()*4, color:currentTheme.ground
                    });
                }
            }

            function die() {
                if (gameState === STATE.BOSS) {
                    bossLives--;
                    if (bossLives <= 0) { gameState = STATE.MENU; stopMusic(); saveData(); }
                    else restartBossWave();
                    return;
                }
                gameState = STATE.GAMEOVER; stopMusic();
                playerCoins += runCoins;
                if (score > highScore) { highScore = score; saveLeaderboard(score); }
                saveData();
                for (let i=0; i<20; i++) particles.push({
                    x:player.x+player.width/2, y:player.y+player.height/2,
                    vx:(Math.random()-0.5)*8, vy:-Math.random()*6,
                    life:1, decay:0.02, size:3+Math.random()*5, color:currentTheme.obs
                });
                flashAlpha = 0.6;
            }

            function winBoss() {
                abilitySlots = 2; bossDefeated = true; playerCoins += 20; saveData();
                gameState = STATE.MENU; stopMusic();
                for (let i=0; i<30; i++) particles.push({
                    x:W/2, y:H/2, vx:(Math.random()-0.5)*10, vy:-Math.random()*8,
                    life:1, decay:0.015, size:5+Math.random()*6, color:'#ffd700'
                });
            }

            function restartBossWave() {
                bossObstacles = []; bossSpawnTimer = 0; bossActiveObstaclesSpawned = 0;
                bossEntity.vibrate = 0; player.y = GROUND_Y - PLAYER_H; player.vy = 0; player.grounded = true;
                player.doubleJumpAvailable = true;
                player.extraJumps = equippedAbilities.includes('tripleJump') ? 1 : 0;
                player.shield = equippedAbilities.includes('shield') ? 1 : 0;
            }

            function startBoss(keepLives = false) {
                if (!keepLives) {
                    if (playerCoins < BOSS_ENTRY_FEE) return false;
                    playerCoins -= BOSS_ENTRY_FEE; saveData();
                    bossLives = MAX_BOSS_LIVES; bossDodged = 0;
                }
                bossObstacles = []; bossSpawnTimer = 0; bossSpawnCooldown = 35;
                bossActiveObstaclesSpawned = 0;
                bossEntity.x = W-80; bossEntity.y = 60; bossEntity.vibrate = 0;
                player.y = GROUND_Y - PLAYER_H; player.vy = 0; player.grounded = true;
                player.doubleJumpAvailable = true;
                player.extraJumps = equippedAbilities.includes('tripleJump') ? 1 : 0;
                player.shield = equippedAbilities.includes('shield') ? 1 : 0;
                gameState = STATE.BOSS; startMusic();
                return true;
            }

            function spawnBossObstacle() {
                const phase = Math.floor(Math.random() * 3);
                switch (phase) {
                    case 0:
                        const spikeH = 25 + Math.random() * 20;
                        bossObstacles.push({ x:W, y:GROUND_Y - spikeH, width:18, height:spikeH, type:'spike', phase:Math.random()*Math.PI*2 });
                        break;
                    case 1:
                        bossObstacles.push({ x:W, y:100+Math.random()*80, width:20, height:20, type:'orb', baseY:100+Math.random()*80, amplitude:40+Math.random()*40, freq:2+Math.random()*2, phase:Math.random()*Math.PI*2 });
                        break;
                    case 2:
                        bossObstacles.push({ x:150+Math.random()*200, y:-30, width:16, height:16, type:'falling', vy:3+Math.random()*3 });
                        break;
                }
                bossActiveObstaclesSpawned++;
                bossSpawnCooldown = Math.max(15, 35 - bossDodged * 0.4);
            }

            function update(dtSec) {
                const factor = Math.min(dtSec/(1/60), 3.0);
                for (let s of stars) { s.x -= s.speed * factor * 0.5; if (s.x < -5) { s.x = W+5; s.y = Math.random()*(GROUND_Y-10); } }
                for (let i=particles.length-1; i>=0; i--) {
                    let p = particles[i]; p.x += p.vx * factor; p.y += p.vy * factor; p.life -= p.decay * factor;
                    if (p.life <= 0) particles.splice(i,1);
                }
                flashAlpha = Math.max(0, flashAlpha - 0.04*factor);
                shakeAmount = Math.max(0, shakeAmount - 0.6*factor);

                if (gameState === STATE.PLAYING || gameState === STATE.BOSS) {
                    const isBoss = gameState === STATE.BOSS;
                    const spd = isBoss ? 6.5 : speed;
                    player.vy += GRAVITY * factor; player.y += player.vy * factor;
                    if (player.y + player.height >= GROUND_Y) {
                        player.y = GROUND_Y - player.height; player.vy=0; player.grounded=true;
                        player.doubleJumpAvailable = true;
                        if (equippedAbilities.includes('tripleJump')) player.extraJumps = 1;
                    } else player.grounded = false;

                    if (spd > 6 && Math.random() < 0.3 * factor) {
                        speedLines.push({ x:Math.random()*W, y:Math.random()*GROUND_Y, length:20+Math.random()*60, life:1, decay:0.02+spd*0.005 });
                    }
                    for (let i=speedLines.length-1; i>=0; i--) {
                        let l = speedLines[i]; l.x -= spd * 1.2 * factor; l.life -= l.decay * factor;
                        if (l.life <= 0 || l.x+l.length < -20) speedLines.splice(i,1);
                    }

                    if (!isBoss) {
                        const delay = Math.max(26, BASE_SPAWN_DELAY - spd*3.3);
                        spawnTimer += factor; if (spawnTimer >= delay) { spawnTimer=0; spawnObstacle(); }
                        coinSpawnTimer += factor; if (coinSpawnTimer >= COIN_SPAWN_DELAY) { coinSpawnTimer=0; if (Math.random()<0.6) spawnCoin(); }
                        for (let o of obstacles) o.x -= spd * factor;
                        for (let c of coins) c.x -= spd * factor;
                        obstacles = obstacles.filter(o => o.x+o.width > -20);
                        coins = coins.filter(c => c.x+c.width > -20);

                        let magnetRange = equippedAbilities.includes('coinMagnet') ? 40 : 12;
                        for (let i=coins.length-1; i>=0; i--) {
                            let c = coins[i]; if (!c.collected) {
                                let dx = (player.x+player.width/2) - (c.x+c.width/2), dy = (player.y+player.height/2) - (c.y+c.height/2);
                                if (Math.sqrt(dx*dx+dy*dy) < magnetRange) { c.collected = true; runCoins++; coins.splice(i,1); }
                            }
                        }

                        for (let o of obstacles) {
                            if (!o.counted && o.x+o.width < player.x) {
                                o.counted = true; let pts = 1;
                                if (equippedAbilities.includes('doubleScore')) pts *= 2;
                                score += pts; runCoins++; scoreThisLevel++;
                                const maxSpeed = baseSpeed + (LEVEL_SPEED_BOOST*(level-1));
                                speed = Math.min(maxSpeed, baseSpeed + scoreThisLevel*SPEED_INC_PER_SCORE);
                                if (equippedAbilities.includes('slowTime')) speed *= 0.75;
                                if (scoreThisLevel >= SCORE_PER_LEVEL) advanceLevel();
                            }
                            if (checkCollision(player.x,player.y,player.width,player.height, o.x,o.y,o.width,o.height)) {
                                if (player.shield > 0) { player.shield--; obstacles.splice(obstacles.indexOf(o),1); flashAlpha=0.4; continue; }
                                die(); return;
                            }
                        }
                    } else {
                        bossSpawnTimer += factor;
                        if (bossSpawnTimer >= bossSpawnCooldown && bossActiveObstaclesSpawned < BOSS_REQUIRED_DODGES * 2) { bossSpawnTimer=0; spawnBossObstacle(); }
                        for (let i=bossObstacles.length-1; i>=0; i--) {
                            let o = bossObstacles[i];
                            switch (o.type) {
                                case 'spike': o.x -= 4 * factor; o.y = (GROUND_Y - o.height) - Math.sin(performance.now()/1000*3 + o.phase)*15; break;
                                case 'orb': o.x -= 4.5 * factor; o.y = o.baseY + Math.sin(performance.now()/1000*o.freq+o.phase)*o.amplitude; break;
                                case 'falling': o.y += o.vy * factor; break;
                            }
                            if (o.x + o.width < -20 || o.y > H+30) {
                                if (o.x + o.width < -20) { bossDodged++; if (bossDodged >= BOSS_REQUIRED_DODGES) { winBoss(); return; } }
                                bossObstacles.splice(i,1); continue;
                            }
                            if (checkCollision(player.x,player.y,player.width,player.height, o.x,o.y,o.width,o.height)) {
                                if (player.shield > 0) { player.shield--; bossObstacles.splice(i,1); flashAlpha=0.4; bossDodged++; if (bossDodged >= BOSS_REQUIRED_DODGES) { winBoss(); return; } continue; }
                                die(); return;
                            }
                        }
                        bossEntity.vibrate = Math.max(0, bossEntity.vibrate - 0.1*factor);
                        if (Math.random() < 0.05) bossEntity.vibrate = 3;
                    }
                }
            }

            function checkCollision(px,py,pw,ph, ox,oy,ow,oh) { return px < ox+ow && px+pw > ox && py < oy+oh && py+ph > oy; }

            function drawPlayerShape() {
                const avatar = getAvatar();
                ctx.fillStyle = avatar.color; ctx.shadowColor = avatar.glow; ctx.shadowBlur = 15;
                const cx = player.x + player.width/2, cy = player.y + player.height/2, w = player.width, h = player.height;
                ctx.beginPath();
                switch (avatar.shape) {
                    case 'square': ctx.rect(player.x, player.y, w, h); break;
                    case 'diamond': ctx.moveTo(cx, player.y); ctx.lineTo(player.x+w, cy); ctx.lineTo(cx, player.y+h); ctx.lineTo(player.x, cy); break;
                    case 'circle': ctx.arc(cx, cy, w/2, 0, Math.PI*2); break;
                    case 'star5':
                        const spikes=5, outerR=w/2, innerR=w/4; let rot = Math.PI/2*3, step = Math.PI/spikes;
                        for (let i=0; i<spikes; i++) {
                            ctx.lineTo(cx+Math.cos(rot)*outerR, cy+Math.sin(rot)*outerR); rot+=step;
                            ctx.lineTo(cx+Math.cos(rot)*innerR, cy+Math.sin(rot)*innerR); rot+=step;
                        } break;
                    case 'hexagon':
                        const sides=6, radius=w/2;
                        for (let i=0; i<sides; i++) {
                            let angle = Math.PI/2 + i*2*Math.PI/sides;
                            i===0 ? ctx.moveTo(cx+radius*Math.cos(angle), cy+radius*Math.sin(angle)) : ctx.lineTo(cx+radius*Math.cos(angle), cy+radius*Math.sin(angle));
                        } break;
                    case 'star8':
                        // Clean 8‑pointed star
                        const points = 8;
                        const outerRadius = w/2;
                        const innerRadius = w/3.5;
                        for (let i = 0; i < points * 2; i++) {
                            const angle = Math.PI/2 - (i * Math.PI / points);
                            const r = i % 2 === 0 ? outerRadius : innerRadius;
                            const x = cx + Math.cos(angle) * r;
                            const y = cy - Math.sin(angle) * r;
                            if (i === 0) ctx.moveTo(x, y);
                            else ctx.lineTo(x, y);
                        }
                        break;
                }
                ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            }

            function drawButton(x,y,w,h,color,text) {
                ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 10;
                ctx.fillRect(x,y,w,h); ctx.shadowBlur = 0;
                ctx.font = 'bold 13px "Courier New"'; ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.fillText(text, x+w/2, y+h/2+5);
            }

            function drawMenu() {
                ctx.clearRect(0,0,W,H); const bg = ctx.createLinearGradient(0,0,0,H);
                bg.addColorStop(0,'#0a0a20'); bg.addColorStop(1,'#151530'); ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
                ctx.font = 'bold 24px "Courier New"'; ctx.textAlign = 'center'; ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
                ctx.fillText('NEON GAUNTLET', W/2, 55); ctx.shadowBlur = 0;
                const av = getAvatar();
                ctx.font = '13px "Courier New"'; ctx.fillStyle = '#aaa';
                ctx.fillText(`Coins: ${playerCoins}  |  Best: ${highScore}`, W/2, 85);
                ctx.fillText(`Avatar: ${av.name} (${av.shape})`, W/2, 105);

                buttons = [];
                buttons.push({ id:'play', x:W/2-70, y:130, w:140, h:32 }); drawButton(W/2-70,130,140,32,'#00cc44','PLAY');
                buttons.push({ id:'shop', x:W/2-70, y:170, w:140, h:32 }); drawButton(W/2-70,170,140,32,'#ffaa00','SHOP');
                buttons.push({ id:'leaderboard', x:W/2-70, y:210, w:140, h:32 }); drawButton(W/2-70,210,140,32,'#00aaff','LEADERBOARD');
                const bossLabel = bossDefeated ? 'BOSS (DEFEATED)' : `BOSS (10 tries / ${BOSS_ENTRY_FEE} coins)`;
                buttons.push({ id:'boss', x:W/2-70, y:250, w:140, h:32 }); drawButton(W/2-70,250,140,32,bossDefeated?'#666':'#ff4444',bossLabel);
            }

            function drawShop() {
                ctx.clearRect(0,0,W,H); const bg = ctx.createLinearGradient(0,0,0,H);
                bg.addColorStop(0,'#0a0a20'); bg.addColorStop(1,'#151530'); ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
                ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'center'; ctx.fillStyle = '#ffaa00'; ctx.fillText('SHOP', W/2, 35);
                ctx.font = '12px'; ctx.fillStyle = '#aaa'; ctx.fillText(`Coins: ${playerCoins} | Slots: ${abilitySlots} | Equipped: ${equippedAbilities.length}/${abilitySlots}`, W/2, 55);
                buttons = []; let y = 75;
                for (let key in ABILITIES) {
                    const a = ABILITIES[key]; const owned = unlockedAbilities.includes(key); const equipped = equippedAbilities.includes(key);
                    const canBuy = playerCoins >= a.cost && !owned; const canEquip = owned && !equipped && equippedAbilities.length < abilitySlots; const canUnequip = equipped;
                    ctx.font = '11px "Courier New"'; ctx.fillStyle = owned ? (equipped?'#0f0':'#888') : '#ffaa00';
                    ctx.fillText(`${a.name} - ${a.desc} (${a.cost} coins)`, W/2, y+10);
                    if (canBuy) { buttons.push({ id:'buy_'+key, x:W/2-40, y:y+15, w:80, h:22 }); drawButton(W/2-40,y+15,80,22,'#00cc44','BUY'); }
                    else if (canEquip) { buttons.push({ id:'equip_'+key, x:W/2-40, y:y+15, w:80, h:22 }); drawButton(W/2-40,y+15,80,22,'#00aaff','EQUIP'); }
                    else if (canUnequip) { buttons.push({ id:'unequip_'+key, x:W/2-40, y:y+15, w:80, h:22 }); drawButton(W/2-40,y+15,80,22,'#ff4444','UNEQUIP'); }
                    y += 40;
                }
                buttons.push({ id:'back', x:20, y:H-45, w:80, h:30 }); drawButton(20,H-45,80,30,'#444','BACK');
            }

            function drawLeaderboard() {
                ctx.clearRect(0,0,W,H); const bg = ctx.createLinearGradient(0,0,0,H);
                bg.addColorStop(0,'#0a0a20'); bg.addColorStop(1,'#151530'); ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
                ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'center'; ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10;
                ctx.fillText('TOP 10 LEADERBOARD', W/2, 40); ctx.shadowBlur = 0;
                ctx.font = '13px "Courier New"';
                for (let i=0; i<10; i++) { ctx.fillStyle = i===0?'#ffd700':'#aaa'; ctx.fillText(`${i+1}. ${leaderboard[i]||'-'}`, W/2, 70+i*25); }
                buttons = []; buttons.push({ id:'back', x:20, y:H-45, w:80, h:30 }); drawButton(20,H-45,80,30,'#444','BACK');
            }

            function drawGameOverlay() {
                ctx.clearRect(0,0,W,H); const grad = ctx.createLinearGradient(0,0,0,H);
                grad.addColorStop(0, currentTheme.bg[0]); grad.addColorStop(1, currentTheme.bg[1]); ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);
                ctx.fillStyle = currentTheme.stars; ctx.shadowColor = currentTheme.stars; ctx.shadowBlur = 3;
                for (let s of stars) { ctx.beginPath(); ctx.arc(s.x,s.y,s.radius,0,Math.PI*2); ctx.fill(); } ctx.shadowBlur=0;
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
                for (let l of speedLines) { ctx.globalAlpha=l.life*0.7; ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x+l.length,l.y); ctx.stroke(); } ctx.globalAlpha=1;
                ctx.beginPath(); ctx.strokeStyle = currentTheme.ground; ctx.lineWidth=2; ctx.shadowColor=currentTheme.ground; ctx.shadowBlur=10;
                const dash=30, gap=15, total=dash+gap, off=(Date.now()*speed*0.03)%total;
                for (let x=-off; x<W+total; x+=total) { ctx.moveTo(x,GROUND_Y); ctx.lineTo(x+dash,GROUND_Y); } ctx.stroke(); ctx.shadowBlur=0;

                if (gameState === STATE.BOSS) {
                    const bx = bossEntity.x+(Math.random()-0.5)*bossEntity.vibrate, by = bossEntity.y+(Math.random()-0.5)*bossEntity.vibrate;
                    ctx.fillStyle = '#ff3333'; ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 20; ctx.fillRect(bx,by,bossEntity.width,bossEntity.height);
                    for (let o of bossObstacles) {
                        ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 12;
                        if (o.type === 'orb') { ctx.beginPath(); ctx.arc(o.x+o.width/2, o.y+o.height/2, o.width/2, 0, Math.PI*2); ctx.fill(); }
                        else ctx.fillRect(o.x, o.y, o.width, o.height);
                    }
                } else {
                    for (let o of obstacles) { ctx.fillStyle=currentTheme.obs; ctx.shadowColor=currentTheme.obs; ctx.shadowBlur=12; ctx.fillRect(o.x,o.y,o.width,o.height); }
                    for (let c of coins) { ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(c.x+c.width/2, c.y+c.height/2, c.width/2,0,Math.PI*2); ctx.fill(); }
                }
                ctx.shadowBlur=0; drawPlayerShape();
                if (player.shield > 0) { ctx.strokeStyle='#0ff'; ctx.lineWidth=3; ctx.shadowColor='#0ff'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(player.x+player.width/2, player.y+player.height/2, player.width/2+5,0,Math.PI*2); ctx.stroke(); }
                if (!player.grounded && (player.doubleJumpAvailable||player.extraJumps>0)) { ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=8; ctx.beginPath(); ctx.arc(player.x+player.width/2, player.y-8,3,0,Math.PI*2); ctx.fill(); }
                ctx.shadowBlur=0;
                for (let p of particles) { ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6; ctx.fillRect(p.x,p.y,p.size,p.size); } ctx.globalAlpha=1;
            }

            function drawHUD() {
                ctx.font = 'bold 18px "Courier New"'; ctx.textAlign='center'; ctx.fillStyle='#fff';
                ctx.fillText(`${score}`, W/2,45); ctx.font='12px'; ctx.fillText(`LVL ${level}`, W/2,65);
                if (gameState===STATE.BOSS) ctx.fillText(`BOSS: ${bossDodged}/${BOSS_REQUIRED_DODGES}  LIVES: ${bossLives}`, W/2,105);
            }

            function draw() {
                const sx = shakeAmount?(Math.random()-0.5)*shakeAmount:0, sy = shakeAmount?(Math.random()-0.5)*shakeAmount:0;
                ctx.save(); ctx.translate(sx,sy);
                if (gameState===STATE.MENU) drawMenu();
                else if (gameState===STATE.SHOP) drawShop();
                else if (gameState===STATE.LEADERBOARD) drawLeaderboard();
                else if (gameState===STATE.PLAYING||gameState===STATE.BOSS) { drawGameOverlay(); drawHUD(); }
                else if (gameState===STATE.GAMEOVER) {
                    drawGameOverlay(); drawHUD();
                    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
                    ctx.font='bold 22px'; ctx.textAlign='center'; ctx.fillStyle='#fff';
                    ctx.fillText('GAME OVER', W/2, H/2-40); ctx.font='14px';
                    ctx.fillText(`Score: ${score}  Coins earned: ${runCoins}`, W/2, H/2-10);
                    ctx.fillText(`Total coins: ${playerCoins}`, W/2, H/2+20);
                    ctx.fillText('TAP TO CONTINUE', W/2, H/2+60);
                }
                ctx.restore();
            }

            function getCanvasCoords(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * W / r.width, y: (e.clientY - r.top) * H / r.height }; }
            canvas.addEventListener('mousedown', e => { const c = getCanvasCoords(e); handleInput(c.x,c.y); });
            canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; const c = getCanvasCoords(t); handleInput(c.x,c.y); }, {passive:false});
            document.addEventListener('keydown', e => {
                if (e.code === 'Space' || e.key === ' ') { e.preventDefault();
                    if (gameState === STATE.PLAYING || gameState === STATE.BOSS) {
                        if (player.grounded) { player.vy = JUMP_VEL; player.grounded=false; player.doubleJumpAvailable=true; }
                        else if (player.doubleJumpAvailable) { player.vy = DOUBLE_JUMP_VEL; player.doubleJumpAvailable=false; }
                        else if (player.extraJumps > 0) { player.vy = DOUBLE_JUMP_VEL; player.extraJumps--; }
                    } else if (gameState === STATE.GAMEOVER) { gameState = STATE.MENU; stopMusic(); }
                }
            });

            function handleInput(mx, my) {
                if (gameState === STATE.MENU) {
                    for (let b of buttons) if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) {
                        if (b.id==='play') { resetRun(); gameState=STATE.PLAYING; startMusic(); }
                        else if (b.id==='shop') { gameState=STATE.SHOP; stopMusic(); }
                        else if (b.id==='leaderboard') { gameState=STATE.LEADERBOARD; stopMusic(); }
                        else if (b.id==='boss' && !bossDefeated) startBoss(false);
                        return;
                    }
                } else if (gameState === STATE.SHOP || gameState === STATE.LEADERBOARD) {
                    for (let b of buttons) if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) {
                        if (b.id==='back') gameState=STATE.MENU;
                        else if (b.id.startsWith('buy_')) { const k=b.id.substring(4); if (playerCoins>=ABILITIES[k].cost && !unlockedAbilities.includes(k)) { playerCoins-=ABILITIES[k].cost; unlockedAbilities.push(k); saveData(); } }
                        else if (b.id.startsWith('equip_')) { const k=b.id.substring(6); if (unlockedAbilities.includes(k) && equippedAbilities.length < abilitySlots) { equippedAbilities.push(k); saveData(); } }
                        else if (b.id.startsWith('unequip_')) { const k=b.id.substring(8); equippedAbilities=equippedAbilities.filter(a=>a!==k); saveData(); }
                        return;
                    }
                } else if (gameState === STATE.GAMEOVER) { gameState=STATE.MENU; stopMusic(); }
                else if (gameState === STATE.PLAYING || gameState === STATE.BOSS) {
                    if (player.grounded) { player.vy = JUMP_VEL; player.grounded=false; player.doubleJumpAvailable=true; }
                    else if (player.doubleJumpAvailable) { player.vy = DOUBLE_JUMP_VEL; player.doubleJumpAvailable=false; }
                    else if (player.extraJumps > 0) { player.vy = DOUBLE_JUMP_VEL; player.extraJumps--; }
                }
            }

            loadData(); loadLeaderboard();
            stars = []; for (let i=0; i<STAR_COUNT; i++) stars.push({ x:Math.random()*W, y:Math.random()*GROUND_Y, speed:0.5+Math.random()*2, radius:0.5+Math.random()*1.8 });
            let lastTime=0;
            function loop(time) { if (!lastTime) lastTime=time; const dt = (time-lastTime)/1000 || 0.016; lastTime=time; update(dt); draw(); requestAnimationFrame(loop); }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
