<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Gauntlet – Shop & Boss</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }
        canvas {
            display: block;
            width: 100%;
            max-width: 900px;
            height: auto;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            image-rendering: crisp-edges;
        }
        .info {
            position: absolute;
            bottom: 10px;
            color: #555;
            font-size: 12px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="320"></canvas>
    <div class="info">TAP / SPACE TO JUMP (DOUBLE TAP FOR AIR JUMP)</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const GROUND_Y = H - 40;
            const PLAYER_W = 22, PLAYER_H = 22;
            const PLAYER_X = 70;

            // --- Game states ---
            const STATE = { MENU: 'menu', PLAYING: 'playing', SHOP: 'shop', BOSS: 'boss', GAMEOVER: 'gameover' };
            let gameState = STATE.MENU;

            // --- Player persistent data ---
            let playerCoins = 0;
            let unlockedAbilities = [];            // array of ability keys
            let equippedAbility = null;            // currently equipped ability key
            let abilitySlots = 1;                  // max abilities you can equip (starts at 1)
            let bossDefeated = false;              // true after beating boss once (permanent)
            let highScore = 0;

            // Abilities definition
            const ABILITIES = {
                shield: { name: 'Shield', desc: 'Start with 1 hit shield', cost: 30, color: '#00ccff' },
                slowTime: { name: 'Slow Time', desc: 'Speed reduced by 25%', cost: 50, color: '#ffaa00' },
                coinMagnet: { name: 'Coin Magnet', desc: 'Attract coins from afar', cost: 20, color: '#ffdd44' },
                doubleScore: { name: 'Double Score', desc: 'Earn 2x points', cost: 40, color: '#ff44ff' },
                tripleJump: { name: 'Triple Jump', desc: 'One extra mid‑air jump', cost: 60, color: '#ff2222' }
            };

            // --- Current run variables ---
            let score = 0;
            let runCoins = 0;
            let speed = 5;
            let baseSpeed = 5;
            let level = 1;
            const SCORE_PER_LEVEL = 15;
            let scoreThisLevel = 0;
            const MAX_SPEED_BASE = 14;
            const SPEED_INCREASE_PER_SCORE = 0.01;
            const LEVEL_SPEED_BOOST = 1.1;

            // Player physics
            let player = { x: PLAYER_X, y: GROUND_Y - PLAYER_H, width: PLAYER_W, height: PLAYER_H, vy: 0, grounded: true, doubleJumpAvailable: true };
            const GRAVITY = 0.55;
            const JUMP_VEL = -9.2;
            const DOUBLE_JUMP_VEL = -6.5;
            let extraJumpsRemaining = 0; // for triple jump ability
            let shieldRemaining = 0;      // for shield ability

            // Objects
            let obstacles = [];
            let coins = [];                // visual coin pickups
            const OBS_W = 20, OBS_MIN_H = 24, OBS_MAX_H = 44;
            const COIN_SIZE = 12;
            let spawnTimer = 0, coinSpawnTimer = 0;
            const BASE_SPAWN_DELAY = 70;
            const COIN_SPAWN_DELAY = 90;

            // Boss level data
            let bossObstacles = [];        // predefined obstacle array for boss
            let bossProgress = 0;          // current index in bossObstacles
            let bossSpeed = 7;
            const BOSS_ENTRY_FEE = 30;
            const BOSS_OBSTACLE_COUNT = 60; // length of boss level

            // Effects
            let particles = [], flashAlpha = 0, shakeAmount = 0;
            let speedLines = [], stars = [];
            const STAR_COUNT = 50;

            // Themes (8 levels)
            const themes = [
                { bg: ['#0a0a14', '#111122'], ground: '#00ffff', obs: '#ff00ff', stars: '#ffffff' },
                { bg: ['#140a0a', '#221111'], ground: '#ffaa00', obs: '#ff4400', stars: '#ff8844' },
                { bg: ['#0a141a', '#0a1f2b'], ground: '#00ccff', obs: '#0088ff', stars: '#88ddff' },
                { bg: ['#0a140a', '#112211'], ground: '#00ff44', obs: '#44ff00', stars: '#88ff44' },
                { bg: ['#140a14', '#221122'], ground: '#ff44ff', obs: '#ff00aa', stars: '#ffaaff' },
                { bg: ['#0a0a14', '#1a1a2e'], ground: '#ffd700', obs: '#ffaa00', stars: '#ffe066' },
                { bg: ['#140a0a', '#0a1414'], ground: '#ff3333', obs: '#33ccff', stars: '#ff9966' },
                { bg: ['#1a0a1a', '#2a0a2a'], ground: '#ffcc00', obs: '#ff0066', stars: '#ff6699' }
            ];
            let currentTheme = themes[0];

            // Button definitions (for mouse/touch)
            let buttons = [];

            // --- Local storage ---
            const SAVE_KEY = 'neonGauntletSave';
            function loadData() {
                try {
                    const data = JSON.parse(localStorage.getItem(SAVE_KEY));
                    if (data) {
                        playerCoins = data.coins || 0;
                        unlockedAbilities = data.unlocked || [];
                        equippedAbility = data.equipped || null;
                        abilitySlots = data.slots || 1;
                        bossDefeated = data.boss || false;
                        highScore = data.highScore || 0;
                    }
                } catch(e) { resetData(); }
                if (!abilitySlots) abilitySlots = 1;
            }
            function saveData() {
                try {
                    localStorage.setItem(SAVE_KEY, JSON.stringify({
                        coins: playerCoins, unlocked: unlockedAbilities,
                        equipped: equippedAbility, slots: abilitySlots,
                        boss: bossDefeated, highScore: highScore
                    }));
                } catch(e) {}
            }
            function resetData() {
                playerCoins = 0; unlockedAbilities = []; equippedAbility = null;
                abilitySlots = 1; bossDefeated = false; highScore = 0;
                saveData();
            }

            function resetRun() {
                player.y = GROUND_Y - PLAYER_H; player.vy = 0; player.grounded = true;
                player.doubleJumpAvailable = true; extraJumpsRemaining = 0; shieldRemaining = 0;
                obstacles = []; coins = []; particles = []; speedLines = [];
                flashAlpha = 0; shakeAmount = 0; spawnTimer = 0; coinSpawnTimer = 0;
                score = 0; runCoins = 0; scoreThisLevel = 0; level = 1;
                baseSpeed = 5; speed = 5; currentTheme = themes[0];
                // Apply equipped ability effects for this run
                if (equippedAbility === 'shield') shieldRemaining = 1;
                if (equippedAbility === 'slowTime') speed *= 0.75; // immediately slow
                if (equippedAbility === 'tripleJump') extraJumpsRemaining = 1;
            }

            // --- Boss level generation ---
            function generateBossLevel() {
                bossObstacles = [];
                let lastX = W + 100;
                for (let i = 0; i < BOSS_OBSTACLE_COUNT; i++) {
                    const gap = 90 - i * 0.5; // gets tighter
                    const minGap = Math.max(50, gap);
                    const x = lastX + minGap + Math.random() * 30;
                    const maxH = getMaxClearableHeight(bossSpeed);
                    const height = 30 + Math.random() * (maxH - 30);
                    bossObstacles.push({ x, y: GROUND_Y - height, width: OBS_W, height, counted: false });
                    lastX = x;
                }
                bossProgress = 0;
                bossSpeed = 6.5;
            }

            function startBossLevel() {
                if (playerCoins < BOSS_ENTRY_FEE) return false;
                playerCoins -= BOSS_ENTRY_FEE;
                saveData();
                generateBossLevel();
                player.y = GROUND_Y - PLAYER_H; player.vy = 0; player.grounded = true;
                player.doubleJumpAvailable = true; extraJumpsRemaining = 0; shieldRemaining = 0;
                if (equippedAbility === 'shield') shieldRemaining = 1;
                if (equippedAbility === 'tripleJump') extraJumpsRemaining = 1;
                gameState = STATE.BOSS;
                return true;
            }

            function getMaxClearableHeight(speed) {
                const peak = (JUMP_VEL * JUMP_VEL) / (2 * GRAVITY);
                const safety = Math.max(0.4, 1.0 - speed * 0.035);
                return Math.floor(peak * safety - 4);
            }

            function advanceLevel() {
                level++;
                baseSpeed = Math.min(level * 1.2 + 3.8, 25);
                speed = baseSpeed;
                if (equippedAbility === 'slowTime') speed *= 0.75;
                scoreThisLevel = 0;
                const idx = (level - 1) % themes.length;
                currentTheme = themes[idx];
                shakeAmount = 6;
                for (let i = 0; i < 15; i++) {
                    particles.push({
                        x: W/2 + (Math.random()-0.5)*100, y: H/2-30,
                        vx: (Math.random()-0.5)*5, vy: -Math.random()*4,
                        life: 1, decay: 0.03, size: 4+Math.random()*4,
                        color: currentTheme.ground
                    });
                }
            }

            function die() {
                if (gameState === STATE.BOSS) {
                    gameState = STATE.MENU;
                    saveData();
                    return;
                }
                gameState = STATE.GAMEOVER;
                playerCoins += runCoins;
                if (score > highScore) highScore = score;
                saveData();
                // death particles
                for (let i=0; i<20; i++) {
                    particles.push({
                        x: player.x+player.width/2, y: player.y+player.height/2,
                        vx: (Math.random()-0.5)*8, vy: -Math.random()*6,
                        life: 1, decay: 0.02, size: 3+Math.random()*5,
                        color: currentTheme.obs
                    });
                }
                flashAlpha = 0.6;
            }

            function winBoss() {
                abilitySlots = 2;
                bossDefeated = true;
                playerCoins += 20; // reward
                saveData();
                gameState = STATE.MENU;
                for (let i=0; i<30; i++) {
                    particles.push({
                        x: W/2, y: H/2, vx: (Math.random()-0.5)*10, vy: -Math.random()*8,
                        life: 1, decay: 0.015, size: 5+Math.random()*6,
                        color: '#ffd700'
                    });
                }
            }

            // --- Update helpers ---
            function moveObjects(arr, spd, factor) {
                for (let i=arr.length-1; i>=0; i--) {
                    arr[i].x -= spd * factor;
                    if (arr[i].x + arr[i].width < -20) arr.splice(i,1);
                }
            }

            function checkCollision(px,py,pw,ph, ox,oy,ow,oh) {
                return px < ox+ow && px+pw > ox && py < oy+oh && py+ph > oy;
            }

            function spawnObstacle() {
                const maxH = getMaxClearableHeight(speed);
                const h = 24 + Math.random() * (maxH - 24);
                obstacles.push({ x: W, y: GROUND_Y - h, width: OBS_W, height: h, counted: false });
            }

            function spawnCoin() {
                coins.push({ x: W, y: GROUND_Y - 50 - Math.random()*30, width: COIN_SIZE, height: COIN_SIZE, collected: false });
            }

            // --- Draw functions ---
            function drawPlayer(x,y,w,h) {
                // glowing cube with current theme player color (or ability tint)
                let color = currentTheme.ground;
                if (equippedAbility && gameState !== STATE.MENU) {
                    const a = ABILITIES[equippedAbility];
                    if (a) color = a.color;
                }
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                ctx.fillRect(x, y, w, h);
                ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
            }

            function drawButton(text, x, y, w, h, color, textColor='#fff') {
                ctx.fillStyle = color;
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                ctx.fillRect(x, y, w, h);
                ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
                ctx.font = 'bold 14px "Courier New"';
                ctx.textAlign = 'center';
                ctx.fillStyle = textColor;
                ctx.fillText(text, x+w/2, y+h/2+5);
            }

            function drawMenu() {
                ctx.clearRect(0,0,W,H);
                const grad = ctx.createLinearGradient(0,0,0,H);
                grad.addColorStop(0, '#0a0a20'); grad.addColorStop(1, '#151530');
                ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

                ctx.font = 'bold 24px "Courier New"'; ctx.textAlign = 'center';
                ctx.fillStyle = '#0ff'; ctx.shadowColor = '#0ff'; ctx.shadowBlur = 12;
                ctx.fillText('NEON GAUNTLET', W/2, 60);
                ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';
                ctx.font = '13px "Courier New"'; ctx.fillStyle = '#aaa';
                ctx.fillText(`Coins: ${playerCoins}  |  High Score: ${highScore}`, W/2, 100);
                ctx.fillText(`Abilities Unlocked: ${unlockedAbilities.length}`, W/2, 120);

                buttons = [];
                // Play button
                buttons.push({ id:'play', x:W/2-70, y:150, w:140, h:35 });
                drawButton('PLAY', W/2-70, 150, 140, 35, '#00cc44');
                // Shop button
                buttons.push({ id:'shop', x:W/2-70, y:200, w:140, h:35 });
                drawButton('SHOP', W/2-70, 200, 140, 35, '#ffaa00');
                // Boss button
                const bossText = bossDefeated ? 'BOSS (DEFEATED)' : `BOSS (${BOSS_ENTRY_FEE} coins)`;
                buttons.push({ id:'boss', x:W/2-70, y:250, w:140, h:35 });
                drawButton(bossText, W/2-70, 250, 140, 35, bossDefeated ? '#666' : '#ff4444');

                ctx.textAlign = 'left';
            }

            function drawShop() {
                ctx.clearRect(0,0,W,H);
                const grad = ctx.createLinearGradient(0,0,0,H);
                grad.addColorStop(0, '#0a0a20'); grad.addColorStop(1, '#151530');
                ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

                ctx.font = 'bold 22px "Courier New"'; ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00'; ctx.fillText('SHOP', W/2, 40);
                ctx.font = '12px "Courier New"'; ctx.fillStyle = '#aaa';
                ctx.fillText(`Coins: ${playerCoins} | Slots: ${abilitySlots}`, W/2, 70);

                buttons = [];
                const abilities = Object.keys(ABILITIES);
                let yPos = 100;
                abilities.forEach(key => {
                    const a = ABILITIES[key];
                    const owned = unlockedAbilities.includes(key);
                    const equipped = equippedAbility === key;
                    const canBuy = playerCoins >= a.cost && !owned;
                    const color = owned ? (equipped ? '#00ff44' : '#555') : '#ffaa00';
                    const text = `${a.name} - ${a.desc} (${a.cost} coins) ${owned ? (equipped ? '[EQUIPPED]' : '[OWNED]') : ''}`;
                    ctx.font = '11px "Courier New"';
                    ctx.fillStyle = color;
                    ctx.fillText(text, W/2, yPos+10);
                    if (!owned && canBuy) {
                        buttons.push({ id:`buy_${key}`, x:W/2-40, y:yPos+15, w:80, h:22 });
                        drawButton('BUY', W/2-40, yPos+15, 80, 22, '#00cc44');
                    } else if (owned && !equipped && abilitySlots > 0) {
                        buttons.push({ id:`equip_${key}`, x:W/2-40, y:yPos+15, w:80, h:22 });
                        drawButton('EQUIP', W/2-40, yPos+15, 80, 22, '#00aaff');
                    } else if (owned && equipped) {
                        buttons.push({ id:`unequip`, x:W/2-40, y:yPos+15, w:80, h:22 });
                        drawButton('UNEQUIP', W/2-40, yPos+15, 80, 22, '#ff4444');
                    }
                    yPos += 50;
                });
                // Back button
                buttons.push({ id:'back', x:20, y:H-50, w:80, h:30 });
                drawButton('BACK', 20, H-50, 80, 30, '#444');
                ctx.textAlign = 'left';
            }

            function drawGame() {
                ctx.clearRect(0,0,W,H);
                const grad = ctx.createLinearGradient(0,0,0,H);
                grad.addColorStop(0, currentTheme.bg[0]); grad.addColorStop(1, currentTheme.bg[1]);
                ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

                // Stars
                ctx.fillStyle = currentTheme.stars; ctx.shadowColor = currentTheme.stars; ctx.shadowBlur = 3;
                stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2); ctx.fill(); });
                ctx.shadowBlur = 0;

                // Speed lines
                ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5;
                speedLines.forEach(l => { ctx.globalAlpha=l.life*0.7; ctx.beginPath(); ctx.moveTo(l.x,l.y); ctx.lineTo(l.x+l.length,l.y); ctx.stroke(); });
                ctx.globalAlpha=1;

                // Ground
                ctx.beginPath(); ctx.strokeStyle=currentTheme.ground; ctx.lineWidth=2; ctx.shadowColor=currentTheme.ground; ctx.shadowBlur=10;
                const dash=30, gap=15, total=dash+gap, offset=(Date.now()*speed*0.03)%total;
                for(let x=-offset; x<W+total; x+=total){ ctx.moveTo(x,GROUND_Y); ctx.lineTo(x+dash,GROUND_Y); }
                ctx.stroke(); ctx.shadowBlur=0;

                // Obstacles
                obstacles.forEach(o=>{ ctx.fillStyle=currentTheme.obs; ctx.shadowColor=currentTheme.obs; ctx.shadowBlur=12; ctx.fillRect(o.x,o.y,o.width,o.height); });
                ctx.shadowBlur=0;

                // Coins
                coins.forEach(c=>{
                    ctx.fillStyle='#ffd700'; ctx.shadowColor='#ffd700'; ctx.shadowBlur=8;
                    ctx.beginPath(); ctx.arc(c.x+c.width/2, c.y+c.height/2, c.width/2, 0, Math.PI*2); ctx.fill();
                });
                ctx.shadowBlur=0;

                // Player
                drawPlayer(player.x, player.y, player.width, player.height);
                if(shieldRemaining>0){ ctx.strokeStyle='#0ff'; ctx.lineWidth=3; ctx.shadowColor='#0ff'; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(player.x+player.width/2,player.y+player.height/2,player.width/2+5,0,Math.PI*2); ctx.stroke(); }
                // double/triple jump dot
                if(!player.grounded && (player.doubleJumpAvailable || extraJumpsRemaining>0)){
                    ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=8;
                    ctx.beginPath(); ctx.arc(player.x+player.width/2, player.y-8, 3, 0, Math.PI*2); ctx.fill();
                }
                ctx.shadowBlur=0;

                // Particles
                particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=6; ctx.fillRect(p.x,p.y,p.size,p.size); });
                ctx.globalAlpha=1;

                // UI
                ctx.font='bold 18px "Courier New"'; ctx.textAlign='center'; ctx.fillStyle='#fff';
                ctx.fillText(`${score}`, W/2, 45); ctx.font='12px'; ctx.fillText(`LVL ${level}`, W/2, 65);
                if(gameState===STATE.BOSS) ctx.fillText(`BOSS ${bossProgress+1}/${BOSS_OBSTACLE_COUNT}`, W/2, 85);
            }

            function drawGameOver() {
                drawGame(); // still show scene behind
                ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
                ctx.font='bold 22px "Courier New"'; ctx.textAlign='center'; ctx.fillStyle='#fff';
                ctx.fillText('GAME OVER', W/2, H/2-40);
                ctx.font='14px'; ctx.fillText(`Score: ${score}  Coins earned: ${runCoins}`, W/2, H/2-10);
                ctx.fillText(`Total coins: ${playerCoins}`, W/2, H/2+20);
                ctx.fillText('TAP TO CONTINUE', W/2, H/2+60);
            }

            // --- Main update ---
            function update(dtSec) {
                const factor = Math.min(dtSec/(1/60), 3.0);
                // Update stars always
                stars.forEach(s=>{ s.x -= s.speed*factor*0.5; if(s.x<-5){ s.x=W+5; s.y=Math.random()*(GROUND_Y-10); } });
                // particles
                for(let i=particles.length-1;i>=0;i--){ let p=particles[i]; p.x+=p.vx*factor; p.y+=p.vy*factor; p.life-=p.decay*factor; if(p.life<=0) particles.splice(i,1); }
                flashAlpha=Math.max(0,flashAlpha-0.04*factor);
                shakeAmount=Math.max(0,shakeAmount-0.6*factor);

                if(gameState===STATE.PLAYING || gameState===STATE.BOSS) {
                    const isBoss = gameState===STATE.BOSS;
                    const spd = isBoss ? bossSpeed : speed;

                    // Player physics
                    player.vy += GRAVITY*factor;
                    player.y += player.vy*factor;
                    if(player.y+player.height >= GROUND_Y) {
                        player.y = GROUND_Y-player.height; player.vy=0; player.grounded=true;
                        player.doubleJumpAvailable = true;
                        if(equippedAbility==='tripleJump') extraJumpsRemaining = 1;
                    } else player.grounded=false;

                    // Speed lines
                    if(spd>6 && Math.random()<0.3*factor) speedLines.push({x:Math.random()*W, y:Math.random()*GROUND_Y, length:20+Math.random()*60, life:1, decay:0.02+spd*0.005});
                    moveObjects(speedLines, spd*1.2, factor); speedLines = speedLines.filter(l=>l.life>0);

                    if(!isBoss) {
                        // Spawn obstacles & coins
                        const delay = Math.max(26, BASE_SPAWN_DELAY - spd*3.3);
                        spawnTimer+=factor; if(spawnTimer>=delay){ spawnTimer=0; spawnObstacle(); }
                        coinSpawnTimer+=factor; if(coinSpawnTimer>=COIN_SPAWN_DELAY){ coinSpawnTimer=0; if(Math.random()<0.6) spawnCoin(); }
                        moveObjects(obstacles, spd, factor);
                        moveObjects(coins, spd, factor);

                        // Scoring & coin collection
                        obstacles.forEach(o=>{
                            if(!o.counted && o.x+o.width < player.x) {
                                o.counted=true;
                                let points = 1;
                                if(equippedAbility==='doubleScore') points*=2;
                                score+=points; runCoins+=1; scoreThisLevel+=1;
                                const maxSpeed = baseSpeed + (LEVEL_SPEED_BOOST*(level-1));
                                speed = Math.min(maxSpeed, baseSpeed + scoreThisLevel*SPEED_INCREASE_PER_SCORE);
                                if(equippedAbility==='slowTime') speed*=0.75;
                                if(scoreThisLevel >= SCORE_PER_LEVEL) advanceLevel();
                            }
                        });
                        // collect coins
                        for(let i=coins.length-1;i>=0;i--){
                            const c=coins[i];
                            if(!c.collected && checkCollision(player.x,player.y,player.width,player.height, c.x,c.y,c.width,c.height)){
                                c.collected=true;
                                runCoins+=1;
                                coins.splice(i,1);
                            }
                        }
                        // collision obstacles
                        for(let o of obstacles){
                            if(checkCollision(player.x,player.y,player.width,player.height, o.x,o.y,o.width,o.height)){
                                if(shieldRemaining>0){ shieldRemaining--; obstacles.splice(obstacles.indexOf(o),1); flashAlpha=0.4; continue; }
                                die(); return;
                            }
                        }
                    } else { // Boss mode
                        // move boss obstacles
                        for(let i=bossObstacles.length-1;i>=0;i--){
                            bossObstacles[i].x -= spd*factor;
                            if(bossObstacles[i].x + bossObstacles[i].width < -20) bossObstacles.splice(i,1);
                        }
                        // collision & progress
                        let hit = false;
                        for(let o of bossObstacles){
                            if(checkCollision(player.x,player.y,player.width,player.height, o.x,o.y,o.width,o.height)){
                                if(shieldRemaining>0){ shieldRemaining--; bossObstacles.splice(bossObstacles.indexOf(o),1); flashAlpha=0.5; continue; }
                                hit = true; break;
                            }
                        }
                        if(hit) { die(); return; }
                        bossProgress = BOSS_OBSTACLE_COUNT - bossObstacles.length;
                        if(bossProgress >= BOSS_OBSTACLE_COUNT) { winBoss(); return; }
                        // spawn next batch? continuous flow
                        if(bossObstacles.length < 5) {
                            const last = bossObstacles.length>0 ? bossObstacles[bossObstacles.length-1].x : W+100;
                            const gap = Math.max(40, 90 - bossProgress*0.4);
                            const maxH = getMaxClearableHeight(bossSpeed);
                            const h = 24 + Math.random()*(maxH-24);
                            bossObstacles.push({ x: last+gap, y:GROUND_Y-h, width:OBS_W, height:h });
                        }
                    }
                }
            }

            // --- Draw based on state ---
            function draw() {
                const sx = shakeAmount ? (Math.random()-0.5)*shakeAmount : 0;
                const sy = shakeAmount ? (Math.random()-0.5)*shakeAmount : 0;
                ctx.save(); ctx.translate(sx, sy);
                if(gameState===STATE.MENU) drawMenu();
                else if(gameState===STATE.SHOP) drawShop();
                else if(gameState===STATE.PLAYING || gameState===STATE.BOSS) drawGame();
                else if(gameState===STATE.GAMEOVER) drawGameOver();
                ctx.restore();
            }

            // --- Input ---
            function handleJump() {
                if(gameState===STATE.PLAYING || gameState===STATE.BOSS){
                    if(player.grounded){
                        player.vy = JUMP_VEL; player.grounded=false; player.doubleJumpAvailable=true;
                    } else if(player.doubleJumpAvailable){
                        player.vy = DOUBLE_JUMP_VEL; player.doubleJumpAvailable=false;
                    } else if(extraJumpsRemaining>0){
                        player.vy = DOUBLE_JUMP_VEL; extraJumpsRemaining--;
                    }
                } else if(gameState===STATE.GAMEOVER){
                    gameState = STATE.MENU;
                }
            }

            canvas.addEventListener('mousedown', e => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const mx = (e.clientX - rect.left) * scaleX;
                const my = (e.clientY - rect.top) * scaleY;
                if(gameState===STATE.MENU || gameState===STATE.SHOP || gameState===STATE.GAMEOVER) {
                    // button check
                    for(let btn of buttons){
                        if(mx>=btn.x && mx<=btn.x+btn.w && my>=btn.y && my<=btn.y+btn.h){
                            if(gameState===STATE.MENU){
                                if(btn.id==='play'){ resetRun(); gameState=STATE.PLAYING; }
                                else if(btn.id==='shop'){ gameState=STATE.SHOP; }
                                else if(btn.id==='boss'){ if(!bossDefeated) startBossLevel(); }
                            } else if(gameState===STATE.SHOP){
                                if(btn.id==='back') gameState=STATE.MENU;
                                else if(btn.id.startsWith('buy_')){
                                    const key = btn.id.split('_')[1];
                                    if(playerCoins >= ABILITIES[key].cost && !unlockedAbilities.includes(key)){
                                        playerCoins -= ABILITIES[key].cost;
                                        unlockedAbilities.push(key);
                                        saveData();
                                    }
                                } else if(btn.id.startsWith('equip_')){
                                    const key = btn.id.split('_')[1];
                                    if(unlockedAbilities.includes(key) && equippedAbility!==key && abilitySlots>0){
                                        equippedAbility = key;
                                        saveData();
                                    }
                                } else if(btn.id==='unequip'){
                                    equippedAbility = null;
                                    saveData();
                                }
                            } else if(gameState===STATE.GAMEOVER){
                                gameState=STATE.MENU;
                            }
                            break;
                        }
                    }
                    if(gameState===STATE.GAMEOVER && !buttons.length) gameState=STATE.MENU;
                } else {
                    handleJump();
                }
            });
            document.addEventListener('keydown', e => {
                if(e.code==='Space' || e.key===' '){ e.preventDefault(); handleJump(); }
            });
            canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); }, {passive:false});
            canvas.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

            // Init
            loadData();
            stars = Array.from({length:STAR_COUNT}, ()=>({x:Math.random()*W, y:Math.random()*GROUND_Y, speed:0.5+Math.random()*2, radius:0.5+Math.random()*1.8}));

            let lastTime=0;
            function loop(time){
                if(!lastTime) lastTime=time;
                let dt = (time-lastTime)/1000;
                if(dt<=0) dt=0.016;
                lastTime=time;
                update(dt);
                draw();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
