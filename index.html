<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon Dash - Endless Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation; /* disable double-tap zoom */
        }
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid #222;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            border-radius: 4px;
            cursor: pointer;
        }
        .info {
            position: absolute;
            bottom: 15px;
            color: #555;
            font-size: 12px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="480" height="320" aria-label="Neon Dash game canvas"></canvas>
    <div class="info">TAP / SPACE TO JUMP</div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // Game dimensions
            const W = canvas.width;
            const H = canvas.height;
            const GROUND_Y = H - 40;          // ground line
            const PLAYER_WIDTH = 22;
            const PLAYER_HEIGHT = 22;
            const PLAYER_X = 70;              // fixed horizontal position

            // Game state
            const STATE = { START: 'start', PLAYING: 'playing', GAMEOVER: 'gameover' };
            let gameState = STATE.START;
            let score = 0;
            let highScore = 0;
            let speed = 5;                    // base obstacle speed (pixels per frame at 60fps)
            const MAX_SPEED = 14;
            const SPEED_INCREASE_PER_SCORE = 0.015;

            // Player
            let player = {
                x: PLAYER_X,
                y: GROUND_Y - PLAYER_HEIGHT,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                vy: 0,
                grounded: true
            };

            const GRAVITY = 0.65;             // per frame at 60fps
            const JUMP_VELOCITY = -8.5;

            // Obstacles
            let obstacles = [];
            const OBSTACLE_WIDTH = 20;
            const OBSTACLE_MIN_HEIGHT = 28;
            const OBSTACLE_MAX_HEIGHT = 50;
            let spawnTimer = 0;
            const BASE_SPAWN_DELAY = 75;       // frames at 60fps between spawns (decreases with speed)

            // Particles (death effect)
            let particles = [];

            // Screen flash effect
            let flashAlpha = 0;

            // Background stars
            let stars = [];
            const STAR_COUNT = 60;

            // Local storage high score
            try {
                const saved = localStorage.getItem('neonDashHighScore');
                if (saved) highScore = parseInt(saved, 10) || 0;
            } catch (e) { /* ignore */ }

            // ---------- Helper: delta time ----------
            let lastTimestamp = 0;
            function deltaFactor(dt) {
                // dt in seconds, reference 16.67ms per frame (60fps)
                return dt / (1 / 60);
            }

            // ---------- Reset game ----------
            function resetGame() {
                player.y = GROUND_Y - PLAYER_HEIGHT;
                player.vy = 0;
                player.grounded = true;
                obstacles = [];
                particles = [];
                flashAlpha = 0;
                score = 0;
                speed = 5;
                spawnTimer = 0;
                gameState = STATE.PLAYING;
            }

            // ---------- Spawn obstacle ----------
            function spawnObstacle() {
                const height = OBSTACLE_MIN_HEIGHT + Math.random() * (OBSTACLE_MAX_HEIGHT - OBSTACLE_MIN_HEIGHT);
                obstacles.push({
                    x: W,
                    y: GROUND_Y - height,
                    width: OBSTACLE_WIDTH,
                    height: height,
                    counted: false
                });
            }

            // ---------- Create death particles ----------
            function createDeathParticles() {
                const count = 14;
                const cx = player.x + player.width / 2;
                const cy = player.y + player.height / 2;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    particles.push({
                        x: cx,
                        y: cy,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - 1.5,
                        life: 1.0,
                        decay: 0.02 + Math.random() * 0.03,
                        size: 3 + Math.random() * 5,
                        color: Math.random() < 0.5 ? '#0ff' : '#f0f'
                    });
                }
                flashAlpha = 0.5;
            }

            // ---------- Initialize stars ----------
            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * W,
                        y: Math.random() * (GROUND_Y - 10),
                        speed: 0.5 + Math.random() * 2.5,
                        radius: 0.5 + Math.random() * 1.8
                    });
                }
            }
            initStars();

            // ---------- Update game ----------
            function update(dtSec) {
                const factor = deltaFactor(dtSec);
                // Cap factor to avoid huge jumps when tab inactive
                const cappedFactor = Math.min(factor, 3.0);

                // Update stars (parallax background)
                for (let s of stars) {
                    s.x -= s.speed * cappedFactor * 0.4;
                    if (s.x < -5) {
                        s.x = W + 5;
                        s.y = Math.random() * (GROUND_Y - 10);
                    }
                }

                if (gameState !== STATE.PLAYING) {
                    // Still update particles and flash even on gameover screen
                    for (let i = particles.length - 1; i >= 0; i--) {
                        const p = particles[i];
                        p.x += p.vx * cappedFactor;
                        p.y += p.vy * cappedFactor;
                        p.life -= p.decay * cappedFactor;
                        if (p.life <= 0) particles.splice(i, 1);
                    }
                    flashAlpha = Math.max(0, flashAlpha - 0.03 * cappedFactor);
                    return;
                }

                // ----- Player physics -----
                player.vy += GRAVITY * cappedFactor;
                player.y += player.vy * cappedFactor;

                // Ground collision
                if (player.y + player.height >= GROUND_Y) {
                    player.y = GROUND_Y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                } else {
                    player.grounded = false;
                }

                // ----- Spawn obstacles -----
                const currentSpawnDelay = Math.max(22, BASE_SPAWN_DELAY - speed * 3.5);
                spawnTimer += cappedFactor;
                if (spawnTimer >= currentSpawnDelay) {
                    spawnTimer = 0;
                    spawnObstacle();
                }

                // ----- Move obstacles & collision -----
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.x -= speed * cappedFactor;

                    // Score counting (pass player)
                    if (!obs.counted && obs.x + obs.width < player.x) {
                        obs.counted = true;
                        score++;
                        // Increase speed gradually
                        speed = Math.min(MAX_SPEED, 5 + score * SPEED_INCREASE_PER_SCORE);
                    }

                    // Remove if off screen
                    if (obs.x + obs.width < -10) {
                        obstacles.splice(i, 1);
                        continue;
                    }

                    // AABB collision with player
                    if (
                        player.x < obs.x + obs.width &&
                        player.x + player.width > obs.x &&
                        player.y < obs.y + obs.height &&
                        player.y + player.height > obs.y
                    ) {
                        // Game over
                        gameState = STATE.GAMEOVER;
                        createDeathParticles();
                        // Update high score
                        if (score > highScore) {
                            highScore = score;
                            try {
                                localStorage.setItem('neonDashHighScore', highScore);
                            } catch (e) { /* ignore */ }
                        }
                        break; // stop checking further collisions
                    }
                }

                // ----- Update particles & flash -----
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * cappedFactor;
                    p.y += p.vy * cappedFactor;
                    p.life -= p.decay * cappedFactor;
                    if (p.life <= 0) particles.splice(i, 1);
                }
                flashAlpha = Math.max(0, flashAlpha - 0.04 * cappedFactor);
            }

            // ---------- Draw ----------
            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Background gradient
                const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
                bgGrad.addColorStop(0, '#0a0a14');
                bgGrad.addColorStop(0.7, '#111122');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, W, H);

                // Draw stars
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 4;
                ctx.fillStyle = '#ffffff';
                for (let s of stars) {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Ground line
                ctx.beginPath();
                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 2;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 10;
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(W, GROUND_Y);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.lineWidth = 1;

                // Obstacles (glowing rectangles)
                for (let obs of obstacles) {
                    ctx.fillStyle = '#ff00ff';
                    ctx.shadowColor = '#ff00ff';
                    ctx.shadowBlur = 14;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                }
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Player (glowing cyan square)
                ctx.fillStyle = '#00ffff';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 18;
                ctx.fillRect(player.x, player.y, player.width, player.height);
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Particles
                for (let p of particles) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 8;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // Screen flash overlay
                if (flashAlpha > 0.01) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                    ctx.fillRect(0, 0, W, H);
                }

                // UI text
                ctx.font = 'bold 20px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 10;
                ctx.fillStyle = '#ffffff';

                if (gameState === STATE.START) {
                    ctx.fillText('NEON DASH', W / 2, H / 2 - 30);
                    ctx.font = '13px "Courier New", monospace';
                    ctx.fillText('TAP OR PRESS SPACE', W / 2, H / 2 + 15);
                } else if (gameState === STATE.PLAYING) {
                    ctx.font = 'bold 20px "Courier New", monospace';
                    ctx.fillText(score, W / 2, 50);
                } else if (gameState === STATE.GAMEOVER) {
                    ctx.fillText('GAME OVER', W / 2, H / 2 - 35);
                    ctx.font = '16px "Courier New", monospace';
                    ctx.fillText(`SCORE: ${score}`, W / 2, H / 2 + 5);
                    ctx.fillText(`BEST: ${highScore}`, W / 2, H / 2 + 30);
                    ctx.font = '12px "Courier New", monospace';
                    ctx.fillText('TAP TO RESTART', W / 2, H / 2 + 55);
                }

                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';
                ctx.textAlign = 'left';
            }

            // ---------- Game loop ----------
            function gameLoop(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                let dtSec = (timestamp - lastTimestamp) / 1000;
                if (dtSec <= 0) dtSec = 0.016; // fallback
                lastTimestamp = timestamp;

                update(dtSec);
                draw();

                requestAnimationFrame(gameLoop);
            }

            // ---------- Input handling ----------
            function handleJump() {
                if (gameState === STATE.START) {
                    resetGame();
                } else if (gameState === STATE.PLAYING) {
                    if (player.grounded) {
                        player.vy = JUMP_VELOCITY;
                        player.grounded = false;
                    }
                } else if (gameState === STATE.GAMEOVER) {
                    resetGame();
                }
            }

            // Keyboard
            document.addEventListener('keydown', function(e) {
                if (e.code === 'Space' || e.key === ' ') {
                    e.preventDefault();
                    handleJump();
                }
            });

            // Mouse
            canvas.addEventListener('mousedown', function(e) {
                e.preventDefault();
                handleJump();
            });

            // Touch
            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handleJump();
            }, { passive: false });

            // Prevent scrolling on canvas touchmove
            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });

            // Start the loop
            requestAnimationFrame(gameLoop);
        })();
    </script>
</body>
</html>
